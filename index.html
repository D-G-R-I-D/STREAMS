<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREAMS — Premium Music Streaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/modals.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- ========== AUTH PAGES ========== -->
<div id="authContainer"></div>


<!-- ========== MAIN APP ========== -->
<div id="appContainer" class="app-layout hidden">
    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo-icon"><i class="fas fa-headphones"></i></div>
            <div class="sidebar-logo-text">STREAMS</div>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-user" id="sidebarUser"></div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <div class="top-bar" id="topBar"></div>
        <div class="page-content" id="pageContent"></div>
    </main>

    <!-- Bottom Player -->
    <div class="player-bar" id="playerBar" style="display:none;"></div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="uploadModal"></div>
<div class="modal-overlay" id="playlistModal"></div>
<div class="modal-overlay" id="addToPlaylistModal"></div>

<!-- Scripts -->
<script src="js/database.js"></script>
<script src="js/utils.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/google-auth.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/player.js"></script>
<script src="js/playlists.js"></script>
<script src="js/crud.js"></script>
<script src="js/views.js"></script>
<script src="js/settings.js"></script>
<script src="js/app.js"></script>
</body>
</html>
